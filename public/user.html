<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuários | Barbearia Sync</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />

    <style>
      body {
        background-color: #f8f9fa;
        font-family: "Inter", sans-serif;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #1e1e1e;
        color: #fff;
      }
      .table-hover tbody tr:hover {
        background-color: rgba(212, 160, 23, 0.05);
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="d-flex">
      <nav
        id="navBar"
        class="d-flex flex-column flex-shrink-0 p-3 sidebar"
        style="width: 250px"
      ></nav>

      <div
        class="flex-grow-1 d-flex flex-column"
        style="height: 100vh; overflow-y: auto"
      >
        <header id="header"></header>

        <main class="container-fluid p-4">
          <div id="stats-container" class="row g-3 mb-4"></div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <button
              class="btn btn-dark d-flex align-items-center gap-2"
              id="buttonCreateUser"
            >
              <i class="bi bi-plus-lg" style="color: #d4a017"></i>
              <span>Novo Usuário</span>
            </button>
          </div>

          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-3">
              <div class="row g-3">
                <div class="col-md-5">
                  <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"
                      ><i class="bi bi-search text-muted"></i
                    ></span>
                    <input
                      type="text"
                      id="txtSearch"
                      class="form-control bg-light border-start-0"
                      placeholder="Buscar..."
                    />
                  </div>
                </div>
                <div class="col-md-3">
                  <select
                    id="filtro-tipo"
                    class="form-select bg-light cursor-pointer"
                  >
                    <option value="">Todos os tipos</option>
                    <option value="CLIENTE">Cliente</option>
                    <option value="PROFISSIONAL">Profissional</option>
                    <option value="ADMIN">Admin</option>
                  </select>
                </div>
                <div class="col-md-3">
                  <select
                    id="filtro-status"
                    class="form-select bg-light cursor-pointer"
                  >
                    <option value="">Todos os status</option>
                    <option value="ativo">Ativo</option>
                    <option value="banido">Banido</option>
                  </select>
                </div>
                <div class="col-md-1">
                  <button
                    class="btn btn-outline-secondary w-100"
                    id="filterUser"
                  >
                    <i class="bi bi-funnel"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="card shadow-sm border-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                  <tr>
                    <th class="ps-4 py-3 text-secondary text-uppercase small">
                      Usuário
                    </th>
                    <th class="py-3 text-secondary text-uppercase small">
                      Email
                    </th>
                    <th class="py-3 text-secondary text-uppercase small">
                      Telefone
                    </th>
                    <th class="py-3 text-secondary text-uppercase small">
                      Tipo
                    </th>
                    <th class="py-3 text-secondary text-uppercase small">
                      Status
                    </th>
                  </tr>
                </thead>

                <tbody id="tabela-usuarios"></tbody>
              </table>
            </div>

            <div
              class="card-footer bg-white py-3 border-top-0 d-flex justify-content-between align-items-center"
            >
              <small class="text-muted" id="pagination-info"
                >Carregando...</small
              >

              <nav>
                <ul
                  class="pagination pagination-sm mb-0"
                  id="pagination-list"
                ></ul>
              </nav>
            </div>
          </div>
        </main>
      </div>
    </div>

    <div
      class="offcanvas offcanvas-end"
      tabindex="-1"
      id="offcanvasUserDetails"
    >
      <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title">Detalhes</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>
      <div class="offcanvas-body p-0" id="user-details-body"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
