<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serviços | Barbearia Sync</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />

    <style>
      body {
        background-color: #f8f9fa;
        font-family: "Inter", sans-serif;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #1e1e1e;
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div class="d-flex">
      <nav
        id="navBar"
        class="d-flex flex-column flex-shrink-0 p-3 sidebar"
        style="width: 250px"
      ></nav>

      <div
        class="flex-grow-1 d-flex flex-column"
        style="height: 100vh; overflow-y: auto"
      >
        <header id="header"></header>

        <main class="container-fluid p-4">
          <div id="stats-container" class="row g-3 mb-4"></div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <button
              class="btn btn-dark d-flex align-items-center gap-2"
              id="buttonCreateService"
            >
              <i class="bi bi-plus-lg" style="color: #d4a017"></i>
              <span>Novo Serviço</span>
            </button>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
