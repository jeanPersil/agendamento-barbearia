<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <title>Login | Barbearia</title>
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fa;
      }
      .login-container {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .logo-section {
        background-color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
      }
      .form-section {
        padding: 3rem;
      }
      .btn-primary {
        background-color: #000;
        border: none;
        padding: 0.8rem;
        font-weight: 600;
      }
      .btn-primary:hover {
        background-color: #333;
      }
      .form-control:focus {
        border-color: #000;
        box-shadow: 0 0 0 0.25rem rgba(0, 0, 0, 0.1);
      }
      a {
        color: #000;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      .logo-section h1 {
        color: rgba(255, 255, 255, 0.9);
        font-size: 1.5rem;
        font-weight: 400;
        text-align: center;
        margin-top: 1rem;
        max-width: 80%;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main
      class="container d-flex min-vh-100 align-items-center justify-content-center"
    >
      <div class="row login-container w-100">
        <div class="col-md-6 form-section">
          <h2 class="mb-4 fw-bold">Bem-vindo de volta!</h2>
          <p class="text-muted mb-4">
            Acesse sua conta e faça seu agendamento!
          </p>

          <div id="alert"></div>

          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label small fw-bold">E-mail</label>
              <input
                type="email"
                class="form-control form-control-lg"
                name="email"
                placeholder="nome@exemplo.com"
                required
              />
            </div>

            <div class="mb-4">
              <label for="senha" class="form-label small fw-bold">Senha</label>
              <input
                type="password"
                class="form-control form-control-lg"
                name="password"
                placeholder="********"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
              Entrar na Conta
            </button>
          </form>

          <div class="text-center mt-4">
            <p class="mb-1 small">
              Ainda não possui uma conta?
              <a href="#">Cadastre-se</a>
            </p>
            <p class="small">
              <a href="#" class="text-muted fw-normal">Esqueceu a senha?</a>
            </p>
          </div>
        </div>

        <div
          class="col-md-6 logo-section d-none d-md-flex flex-column text-center"
        >
          <img
            src="/assets/imgs/logo.jpg"
            class="img-fluid p-4"
            style="max-height: 60%; object-fit: contain"
            alt="Logo da barbearia"
          />
          <h1>Tradição, estilo e precisão em cada corte</h1>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
