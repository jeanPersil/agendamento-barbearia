<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Barbearia</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />

    <style>
      body {
        background-color: #f8f9fa;
        font-family: "Inter", sans-serif;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #1e1e1e;
        color: #fff;
      }
      .nav-link {
        color: #b0b0b0;
        margin-bottom: 5px;
        border-radius: 8px;
        transition: all 0.3s;
      }
      .nav-link:hover,
      .nav-link.active {
        background-color: rgba(212, 160, 23, 0.15);
        color: #d4a017;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div class="d-flex">
      <nav
        id="navBar"
        class="d-flex flex-column flex-shrink-0 p-3 sidebar"
        style="width: 250px"
      ></nav>

      <div
        class="flex-grow-1 d-flex flex-column"
        style="height: 100vh; overflow-y: auto"
      >
        <header id="header"></header>

        <main class="container-fluid p-4">
          <div id="stats-container" class="row g-3 mb-4"></div>

          <div class="card shadow-sm border-0">
            <div
              class="card-header bg-white py-3 d-flex justify-content-between align-items-center"
            >
              <h5 class="mb-0 fw-bold">Agendamentos de hoje</h5>
              <button class="btn btn-sm btn-outline-dark">Ver todos</button>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-hover table-custom align-middle mb-0">
                  <thead class="bg-light">
                    <tr>
                      <th scope="col" class="ps-4">Cliente</th>
                      <th scope="col">Profissional</th>
                      <th scope="col">Serviço</th>
                      <th scope="col">Horário</th>
                      <th scope="col">Status</th>
                    </tr>
                  </thead>
                  <tbody id="tabela-agendamentos"></tbody>
                </table>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
