<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Barbearia</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />

    <style>
      .timeline {
        position: relative;
        padding-left: 1rem;
      }

      .timeline::before {
        content: " ";
        background: #e9ecef;
        display: inline-block;
        position: absolute;
        left: 26px;
        width: 2px;
        height: 100%;
        z-index: 1;
        top: 10px;
      }

      .timeline-item {
        position: relative;
        padding-left: 3rem;
        margin-bottom: 1.5rem;
      }

      .timeline-dot {
        position: absolute;
        left: 19px;
        top: 5px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        z-index: 2;
        background-color: #fff;
        border: 3px solid #dee2e6;
      }

      .timeline-dot.done {
        background-color: #198754;
        border-color: #198754;
      }

      .timeline-dot.current {
        background-color: #ffc107;
        border-color: #ffc107;
        box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.2);
      }

      .appointment-card.active {
        background-color: #fff9e6;
        border: 1px solid #ffecb5;
        border-radius: 12px;
        padding: 1rem;
        margin-left: -1rem;
      }
    </style>
  </head>

  <body>
    <div class="d-flex">
      <nav
        id="navBar"
        class="d-flex flex-column flex-shrink-0 p-3 sidebar"
        style="width: 250px"
      ></nav>

      <div
        class="flex-grow-1 d-flex flex-column"
        style="height: 100vh; overflow-y: auto"
      >
        <header id="header"></header>

        <main class="container-fluid p-4">
          <div id="stats-container" class="row g-3 mb-4"></div>

          <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
              <h5 class="mb-0 fw-bold">
                <i class="bi bi-calendar-day me-2 text-warning"></i> Agenda de
                Hoje
              </h5>
            </div>

            <div class="card-body">
              <div id="agenda-timeline" class="timeline py-2"></div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
